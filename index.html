<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison Dorée Menu</title>
  
  <!-- Tailwind CSS for layout layout & Lucide Icons via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React & Babel CDNs so it runs directly in the browser with zero setup -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Figtree:wght@300;400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0A0A0A; color: #F0EDE8; font-family: 'Figtree', sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { display: none; }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #0A0A0A; position: relative; overflow-x: hidden; }
    .hero { position: relative; height: 230px; overflow: hidden; }
    .hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(.42); }
    .hero-ov { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,10,10,0) 25%, #0A0A0A 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 0 20px 22px; }
    .hero-name { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 700; color: #F0EDE8; line-height: 1; }
    .hero-sub { font-size: 11px; font-weight: 500; color: #C9A84C; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 5px; }
    .table-badge { position: absolute; top: 16px; right: 16px; background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,0.4); color: #C9A84C; font-size: 11px; font-weight: 600; padding: 5px 13px; border-radius: 20px; }
    .sticky-bar { position: sticky; top: 0; z-index: 50; background: #0A0A0A; padding: 12px 16px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-input { width: 100%; background: #181818; border: 1px solid rgba(255,255,255,.09); border-radius: 12px; padding: 11px 36px; color: #F0EDE8; font-size: 14px; outline: none; }
    .filters { display: flex; gap: 6px; overflow-x: auto; padding: 0 0 10px; }
    .fpill { padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; border: 1px solid rgba(255,255,255,.1); background: #181818; color: #888; }
    .fpill.on { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.4); color: #C9A84C; }
    .catbar { display: flex; overflow-x: auto; margin: 0 -16px; padding: 0 16px; }
    .catbtn { padding: 10px 14px; font-size: 13px; font-weight: 500; color: #555; background: none; border: none; border-bottom: 2px solid transparent; white-space: nowrap; }
    .catbtn.on { color: #C9A84C; border-bottom-color: #C9A84C; }
    .card { display: flex; gap: 12px; padding: 14px; background: #141414; border: 1px solid rgba(255,255,255,0.07); border-radius: 16px; margin-bottom: 10px; }
    .dprice { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 700; color: #C9A84C; }
    .toast { position: fixed; top: 22px; left: 50%; transform: translateX(-50%); background: #222; border: 1px solid rgba(255,255,255,.12); color: #F0EDE8; padding: 10px 22px; border-radius: 50px; font-size: 13px; z-index: 200; }
  </style>
</head>
<body>

  <div id="root"></div>

  <!-- Script compilation directly in browser via Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const RESTAURANT = {
      name: "Maison Dorée",
      tagline: "Modern Mediterranean Brasserie",
      heroImage: "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900&q=80",
      table: "Table 7",
      currency: "$"
    };

    const CATEGORIES = [
      { id: "starters", label: "Starters", emoji: "🥗" },
      { id: "mains",    label: "Mains",    emoji: "🥩" },
      { id: "drinks",   label: "Drinks",   emoji: "🍷" }
    ];

    const MENU = [
      { id: 1, category: "starters", name: "Burrata & Heirloom Tomatoes", price: 18, description: "Creamy burrata with vine-ripened heirloom tomatoes, fresh basil oil." },
      { id: 2, category: "mains", name: "45-Day Côte de Boeuf", price: 68, description: "Dry-aged prime rib, pommes dauphine, bone marrow butter, red wine jus." },
      { id: 3, category: "drinks", name: "Negroni Sbagliato", price: 16, description: "Campari, sweet vermouth, Franciacorta Prosecco, blood orange twist." }
    ];

    function App() {
      const [query, setQuery] = useState("");
      const [activecat, setActivecat] = useState("starters");
      const [toast, setToast] = useState(null);

      const fireToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2000);
      };

      const visible = MENU.filter(item => item.name.toLowerCase().includes(query.toLowerCase()));

      return (
        <div className="app">
          {/* Hero */}
          <div className="hero">
            <img src={RESTAURANT.heroImage} alt={RESTAURANT.name} />
            <div className="hero-ov">
              <div className="hero-name">{RESTAURANT.name}</div>
              <div className="hero-sub">{RESTAURANT.tagline}</div>
            </div>
            <div className="table-badge">{RESTAURANT.table}</div>
          </div>

          {/* Sticky Controls */}
          <div className="sticky-bar">
            <div className="search-wrap">
              <input 
                className="search-input" 
                placeholder="Search dishes..." 
                value={query} 
                onChange={e => setQuery(e.target.value)} 
              />
            </div>
            <div className="catbar">
              {CATEGORIES.map(c => (
                <button 
                  key={c.id} 
                  className={`catbtn ${activecat === c.id ? 'on' : ''}`}
                  onClick={() => setActivecat(c.id)}
                >
                  {c.emoji} {c.label}
                </button>
              ))}
            </div>
          </div>

          {/* Content List */}
          <div className="p-4 pb-24">
            {visible.filter(i => i.category === activecat).map(dish => (
              <div key={dish.id} className="card" onClick={() => fireToast(`✨ Selected ${dish.name}`)}>
                <div className="flex-1">
                  <div className="text-base font-semibold mb-1">{dish.name}</div>
                  <div className="text-xs text-gray-500 mb-2">{dish.description}</div>
                  <div className="dprice">{RESTAURANT.currency}{dish.price}</div>
                </div>
              </div>
            ))}
          </div>

          {/* Direct Waiter Button */}
          <div className="fixed bottom-6 right-6 z-50">
            <button 
              className="w-14 h-14 rounded-full bg-[#C9A84C] text-black shadow-lg flex items-center justify-center text-xl font-bold"
              onClick={() => fireToast("🔔 Waiter called successfully!")}
            >
              🔔
            </button>
          </div>

          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    // Mount everything cleanly
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
