/* ─── FIXED ICON HELPER (Bulletproof CDN Implementation) ─── */
const Icon = ({ name, size = 16, color = 'currentColor', strokeWidth = 1.5 }) => {
  const iconRef = useRef(null);

  useEffect(() => {
    if (iconRef.current) {
      iconRef.current.innerHTML = '';
      // Dynamically generate basic paths to support Lucide keys cleanly without arrays crashing
      const paths = {
        search: '<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',
        x: '<line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>',
        bell: '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path>'
      };

      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', color);
      svg.setAttribute('stroke-width', strokeWidth);
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      svg.innerHTML = paths[name] || '';
      iconRef.current.appendChild(svg);
    }
  }, [name, size, color, strokeWidth]);

  return <span ref={iconRef} className="inline-flex items-center justify-center" />;
};

/* ─── TOAST ──────────────────────────────────────────────────── */
const Toast = ({ visible, onHide }) => {

  }, [visible, onHide]);
  if (!visible) return null;
  return (
    <div className="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 animate-toastIn">
      <div className="toast-glass flex items-center gap-3 px-6 py-4 rounded-sm" style={{ fontFamily: 'Figtree, sans-serif' }}>

          <h1 className="animate-fadeSlideDown" style={{
            fontFamily: 'Cormorant Garamond, serif', fontSize: 'clamp(40px, 8vw, 72px)',
            fontWeight: 300, color: '#F0EDE8', margin: '0 0 6px', letterSpacing: '0.12em',
            textTransform: 'uppercase', animationDelay: '0.1s'
          }}>
            Maison Zephyr
          </h1>

          <p className="animate-fadeSlideDown" style={{
            fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic',
            fontSize: 'clamp(16px, 2.5vw, 20px)', color: 'rgba(201,168,76,0.8)',
            margin: '0 0 20px', fontWeight: 300, letterSpacing: '0.05em', animationDelay: '0.2s'
          }}>
            An art of dining. A theatre of senses.
          </p>

          <div className="gold-divider mb-5 animate-fadeSlideDown" style={{ animationDelay: '0.25s' }} />

          <div className="badge-table animate-fadeSlideDown" style={{ animationDelay: '0.35s' }}>
            VIP Table 7 — Private Dining
          </div>

          <div className="animate-fadeSlideDown" style={{ display: 'flex', gap: 32, marginTop: 28, animationDelay: '0.45s' }}>
            {[
              ['Open', '19:00 – 01:00'], 
              ['Chef', 'Youssef El Amrani'], 
              ['Location', 'Tétouan, MA']
            ].map(([label, val]) => (
              <div key={label} className="text-center">
                <p style={{ color: 'rgba(201,168,76,0.6)', fontSize: 10, letterSpacing: '0.18em', textTransform: 'uppercase', margin: '0 0 2px' }}>{label}</p>
                <p style={{ color: 'rgba(240,237,232,0.75)', fontSize: 13, fontWeight: 300, margin: 0, letterSpacing: '0.02em' }}>{val}</p>
              </div>
            ))}
          </div>
        </section>

        {/* STICKY NAV */}
        <div className="sticky top-0 z-30 nav-glass animate-fadeSlideDown" style={{ animationDelay: '0.5s' }}>
          <div className="max-w-4xl mx-auto px-4 py-4">
            <div className="relative mb-3">
              <span className="absolute left-3 top-1/2 -translate-y-1/2">
                <Icon name="search" size={15} color="rgba(201,168,76,0.5)" />
              </span>
              <input
                type="text"
                placeholder="Search the menu…"
                value={search}
                onChange={e => { setSearch(e.target.value); setCategory('All'); }}
                className="input-glass w-full rounded-sm pl-9 pr-4 py-2.5"
                style={{ fontSize: 13, letterSpacing: '0.02em' }}
              />
              {search && (
                <button onClick={() => setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2" style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 0 }}>
                  <Icon name="x" size={14} color="rgba(240,237,232,0.4)" />
                </button>
              )}
            </div>
            <div className="flex gap-1 overflow-x-auto hide-scrollbar">
              {CATEGORIES.map(cat => (
                <button key={cat}
                  className={`cat-btn${category === cat && !search ? ' active' : ''}`}
                  onClick={() => { setCategory(cat); setSearch(''); }}>
                  {cat}
                </button>
              ))}
            </div>
          </div>
          <div className="gold-divider-full" />
        </div>

        {/* MENU ITEMS GRID */}
        <main className="max-w-4xl mx-auto px-4 py-10 pb-28">
          {Object.keys(grouped).length === 0 ? (
            <div className="flex flex-col items-center justify-center py-24 text-center">
              <div className="no-results-icon">
                <Icon name="search" size={22} color="rgba(201,168,76,0.4)" />
              </div>
              <p style={{ fontFamily: 'Cormorant Garamond, serif', fontSize: 28, fontStyle: 'italic', color: 'rgba(240,237,232,0.5)', margin: '0 0 8px' }}>
                Nothing found
              </p>
              <p style={{ color: 'rgba(240,237,232,0.3)', fontSize: 13, margin: 0 }}>
                Try a different search or browse by category.
              </p>
            </div>
          ) : (
            Object.entries(grouped).map(([cat, items]) => (
              <section key={cat}>
                <SectionHeader title={cat} />
                <div className="grid gap-4 md:grid-cols-2">
                  {items.map((item, idx) => (
                    <MenuCard key={item.id} item={item} idx={idx} />
                  ))}
                </div>
                <div className="gold-divider-full mt-10" />
              </section>
            ))
          )}

          {/* Footer Metadata */}
          <div className="text-center mt-12">
            <p style={{ color: 'rgba(240,237,232,0.25)', fontSize: 12, letterSpacing: '0.06em', fontWeight: 300 }}>
              All prices in Moroccan Dirham (MAD) inclusive of taxes &amp; service.<br />
              Kindly inform your host of any dietary requirements or allergies.
            </p>
            <p style={{ fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic', color: 'rgba(201,168,76,0.35)', fontSize: 16, marginTop: 8 }}>
              Maison Zephyr — Tétouan, Morocco
            </p>
          </div>
        </main>

        {/* FLOATING ACTION WAITER CALL BUTTON */}
        <button
          className="call-btn fixed bottom-7 right-6 z-40 flex items-center gap-2.5 rounded-sm px-5 py-3.5 text-[#0a0806] animate-fadeSlideUp"
          onClick={() => setToast(true)}
          style={{ fontFamily: 'Figtree, sans-serif', fontSize: 13, fontWeight: 600, letterSpacing: '0.08em', textTransform: 'uppercase', animationDelay: '0.8s' }}>
          <Icon name="bell" size={15} color="#0a0806" strokeWidth={2} />
          Call Waiter
        </button>

        <Toast visible={toast} onHide={hideToast} />
      </div>
    </div>
  );
}

// Fixed target loader instantiation block
const container = document.getElementById('root');
const root = ReactDOM.createRoot(container);
root.render(<App />);
</script>
</body>
</html>
