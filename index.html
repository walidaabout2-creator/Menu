<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison Dorée Menu</title>
  
  <!-- Tailwind CSS & Lucide Icons via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Figtree:wght@300;400;500;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #0A0A0A; color: #F0EDE8; font-family: 'Figtree', sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { display: none; }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #0A0A0A; position: relative; overflow-x: hidden; }
    .hero { position: relative; height: 230px; overflow: hidden; }
    .hero img { width: 100%; height: 100%; object-fit: cover; filter: brightness(.42); }
    .hero-ov { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(10,10,10,0) 25%, #0A0A0A 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: 0 20px 22px; }
    .hero-name { font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 700; color: #F0EDE8; line-height: 1; }
    .hero-sub { font-size: 11px; font-weight: 500; color: #C9A84C; letter-spacing: 2.5px; text-transform: uppercase; margin-top: 5px; }
    .table-badge { position: absolute; top: 16px; right: 16px; background: rgba(201,168,76,.12); border: 1px solid rgba(201,168,76,0.4); color: #C9A84C; font-size: 11px; font-weight: 600; padding: 5px 13px; border-radius: 20px; }
    .sticky-bar { position: sticky; top: 0; z-index: 50; background: #0A0A0A; padding: 12px 16px 0; border-bottom: 1px solid rgba(255,255,255,0.07); }
    .search-wrap { position: relative; margin-bottom: 10px; }
    .search-input { width: 100%; background: #181818; border: 1px solid rgba(255,255,255,.09); border-radius: 12px; padding: 11px 36px; color: #F0EDE8; font-size: 14px; outline: none; }
    .catbar { display: flex; overflow-x: auto; margin: 0 -16px; padding: 0 16px; gap: 4px; }
    .catbtn { padding: 12px 16px; font-size: 13px; font-weight: 500; color: #777; background: none; border: none; border-bottom: 2px solid transparent; white-space: nowrap; transition: all 0.2s; }
    .catbtn.on { color: #C9A84C; border-bottom-color: #C9A84C; font-weight: 600; }
    .card { display: flex; gap: 12px; padding: 16px; background: #141414; border: 1px solid rgba(255,255,255,0.04); border-radius: 16px; margin-bottom: 12px; transition: transform 0.1s; }
    .card:active { transform: scale(0.98); }
    .dprice { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 700; color: #C9A84C; margin-top: 4px; }
    .toast { position: fixed; top: 22px; left: 50%; transform: translateX(-50%); background: #1E1E1E; border: 1px solid rgba(201,168,76,0.3); color: #F0EDE8; padding: 12px 24px; border-radius: 50px; font-size: 13px; z-index: 200; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const RESTAURANT = {
      name: "Maison Dorée",
      tagline: "Modern Mediterranean Brasserie",
      heroImage: "https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=900&q=80",
      table: "VIP Lounge",
      currency: " MAD"
    };

    const CATEGORIES = [
      { id: "starters", label: "Starters & Salads", emoji: "🥗" },
      { id: "mains",    label: "Main Courses",      emoji: "🥩" },
      { id: "desserts", label: "Desserts",          emoji: "✨" },
      { id: "drinks",   label: "Beverages",         emoji: "🍷" }
    ];

    const MENU = [
      // STARTERS & SALADS
      { id: 1, category: "starters", name: "Burrata d'Andria", price: 120, description: "Creamy burrata, heirloom cherry tomatoes, cold-pressed basil olive oil, aged balsamic." },
      { id: 2, category: "starters", name: "Classic Caesar Salad", price: 95, description: "Crisp romaine lettuce, parmigiano-reggiano shaving, garlic herb croutons, signature dressing." },
      { id: 3, category: "starters", name: "Mediterranean Octopus", price: 140, description: "Thinly sliced charred octopus, citrus segment emulsion, micro-greens." },

      // MAINS
      { id: 4, category: "mains", name: "45-Day Dry Aged Entrecôte", price: 290, description: "Prime beef ribeye served with velvety pommes purée, wild mushroom jus." },
      { id: 5, category: "mains", name: "Pan-Seared Sea Bass", price: 240, description: "Fresh local line-caught fish, asparagus spears, saffron-infused butter reduction." },
      { id: 6, category: "mains", name: "Truffle Tagliolini", price: 185, description: "Fresh homemade egg pasta tossed in a rich Umbrian black truffle cream sauce." },

      // DESSERTS
      { id: 7, category: "desserts", name: "Le Grand Tiramisu", price: 85, description: "Layers of delicate espresso-soaked ladyfingers, velvety mascarpone cream, dark cocoa powder." },
      { id: 8, category: "desserts", name: "Molten Chocolate Fondant", price: 90, description: "Warm Valrhona chocolate cake with a molten core, paired with premium vanilla bean gelato." },
      { id: 9, category: "desserts", name: "Saffron Panna Cotta", price: 75, description: "Silky cream infused with local saffron strands, wild berry compote overlay." },

      // BEVERAGES
      { id: 10, category: "drinks", name: "Signature Mint Mojito", price: 65, description: "Fresh crushed garden mint, zesty lime wedges, organic brown sugar, sparkling soda." },
      { id: 11, category: "drinks", name: "Premium Passion Fruit Mojito", price: 70, description: "Exotic passion fruit pulp, fresh lime juices, fresh mint bouquet, aromatic splash." },
      { id: 12, category: "drinks", name: "Coca-Cola / Zero", price: 35, description: "Served perfectly chilled with sliced organic lemon and crystal ice cubes." },
      { id: 13, category: "drinks", name: "Infused Pure Water (750ml)", price: 40, description: "Premium local spring water softly infused with fresh cucumber and mint slices." }
    ];

    function App() {
      const [query, setQuery] = useState("");
      const [activecat, setActivecat] = useState("starters");
      const [toast, setToast] = useState(null);

      const fireToast = (msg) => {
        setToast(msg);
        setTimeout(() => setToast(null), 2500);
      };

      // Filter logic for live search bar tracking
      const filteredItems = MENU.filter(item => 
        item.name.toLowerCase().includes(query.toLowerCase()) || 
        item.description.toLowerCase().includes(query.toLowerCase())
      );

      return (
        <div className="app">
          {/* Top Hero Banner */}
          <div className="hero">
            <img src={RESTAURANT.heroImage} alt={RESTAURANT.name} />
            <div className="hero-ov">
              <div className="hero-name">{RESTAURANT.name}</div>
              <div className="hero-sub">{RESTAURANT.tagline}</div>
            </div>
            <div className="table-badge">{RESTAURANT.table}</div>
          </div>

          {/* Sticky Filtering & Navigation Control Center */}
          <div className="sticky-bar">
            <div className="search-wrap">
              <input 
                className="search-input" 
                placeholder="Search dishes, drinks, ingredients..." 
                value={query} 
                onChange={e => setQuery(e.target.value)} 
              />
            </div>
            <div className="catbar">
              {CATEGORIES.map(c => (
                <button 
                  key={c.id} 
                  className={`catbtn ${activecat === c.id ? 'on' : ''}`}
                  onClick={() => setActivecat(c.id)}
                >
                  {c.emoji} {c.label}
                </button>
              ))}
            </div>
          </div>

          {/* Interactive Dynamic Content Rendering */}
          <div className="p-4 pb-24">
            {filteredItems.filter(i => i.category === activecat).length > 0 ? (
              filteredItems.filter(i => i.category === activecat).map(dish => (
                <div key={dish.id} className="card" onClick={() => fireToast(`✨ Added ${dish.name} to order list`)}>
                  <div className="flex-1">
                    <div className="text-base font-semibold mb-1 text-[#F0EDE8]">{dish.name}</div>
                    <div className="text-xs text-gray-400 font-light leading-relaxed mb-2">{dish.description}</div>
                    <div className="dprice">{dish.price}{RESTAURANT.currency}</div>
                  </div>
                </div>
              ))
            ) : (
              <div className="text-center py-12 text-sm text-gray-500">
                No items match your specific preference.
              </div>
            )}
          </div>

          {/* Quick Call Waiter Floating Button */}
          <div className="fixed bottom-6 right-6 z-50">
            <button 
              className="w-14 h-14 rounded-full bg-[#C9A84C] text-black shadow-xl flex items-center justify-center text-xl font-bold hover:scale-105 active:scale-95 transition-transform"
              onClick={() => fireToast("🔔 Waiter notified. Attendant attending shortly.")}
            >
              🔔
            </button>
          </div>

          {toast && <div className="toast">{toast}</div>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
